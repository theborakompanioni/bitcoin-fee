syntax = "proto3";

package satoshiapi;

option java_package = "org.tbk.bitcoin.tool.fee.satoshiapi.proto";
option java_outer_classname = "SatoshiApiProtos";
option java_multiple_files = true;

/**
 * Recommended Fees
 * https://bitcoinsapi.com/api/v1/fees/recommended
 *
 * For example:
 * {
 *   "data": {
 *     "recommendation": "Fees are very low. 1.0 sat/vB should confirm within a day.",
 *     "estimates": {
 *       "1": 2.129,
 *       "3": 2.129,
 *       "6": 2.009,
 *       "25": 1.0,
 *       "144": 1.0
 *     }
 *   }
 * }
 */
message RecommendedFeesResponse {
    message Data {
        string recommendation = 1;
        map<string, double> estimates = 2;
    }

    Data data = 1;
}
